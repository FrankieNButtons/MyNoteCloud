  <!-- 文字标注 -->
  <text x="655" y="416" font-size="22">y</text>
  <text x="78" y="42" font-size="22">r</text>
  <text x="595" y="367" font-size="22" fill="#d94841">IS</text>
  <text x="355" y="438" font-size="18">y*</text>
  <text x="58" y="236" font-size="18">r*</text>
</svg>
